name: Build .NET EXE

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ACTIONS_RUNNER_PRINT_DEPRECATION_WARNINGS: false # <-- Silences the persistent runner deprecation annotations completely

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x' 

    - name: Compile to Single EXE
      working-directory: client
      run: dotnet publish -c Release -r win-x64 --self-contained true /p:PublishSingleFile=true /p:PublishReadyToRun=true

    - name: Upload EXE to GitHub for Download
      uses: actions/upload-artifact@v4
      with:
        name: EncryptedChat-App
        path: '**/*.exe'
